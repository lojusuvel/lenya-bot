name: Deploy Sych Bot

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            set -e

            # 1. Загружаем окружение (SSH-сессия GitHub "слепая" и не видит пути nvm/pm2)
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh" || true
            source ~/.bashrc || true

            # 2. Переходим в папку
            cd /home/your_user/sych_bot

            # 3. Сбрасываем локальные правки lock-файла.
            # npm install --production плодит изменения в package-lock.json, из-за чего
            # git pull залипает ("local changes would be overwritten"). Чистим перед pull.
            git checkout -- package-lock.json || true

            # 4. Скачиваем обновления (set -e => при ошибке pull деплой ПАДАЕТ,
            # а не рестартует молча старый код)
            git pull origin main

            # 5. Обновляем библиотеки и перезапускаем
            npm install --production
            pm2 restart sych-bot