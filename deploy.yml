name: Deploy Lenya Bot

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            set -e

            # грузим окружение, чтобы всё работало
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh" || true
            source ~/.bashrc || true

            # идём в папку с ботом
            cd /home/your_user/lenya_bot

            # сбрасываем локальные правки, чтобы не было конфликтов
            git checkout -- package-lock.json || true

            # качаем обновления
            git pull origin main

            # ставим нужные библиотеки
            npm install --production

            # перезапускаем лёню
            pm2 restart lenya-bot
